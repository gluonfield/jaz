<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale + user-scalable=no stop iOS Safari from zooming the
         viewport when a small-font input gains focus; in-app scaling is the
         Appearance font-scale (documentElement.zoom), not browser pinch-zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <!-- Installed-to-home-screen (iOS/Android): without a manifest declaring a
         standalone scope, iOS treats the web-clip as a bookmark and opens every
         in-app navigation in its in-app Safari browser. scope:"/" + standalone
         keep SPA routing inside the installed app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-1024.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Jaz" />
    <meta name="theme-color" content="#f1f2f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1b22" media="(prefers-color-scheme: dark)" />
    <title>Jaz</title>
    <script>
      // Apply the saved theme before first paint so dark launches never flash
      // white. Mirrors lib/theme.ts; keep the dark bg value in sync with the
      // --color-bg token under :root.dark. In the mac app (preload present)
      // the page stays transparent so the window's vibrancy material shows.
      ;(function () {
        try {
          var pref = localStorage.getItem('jaz.theme') || 'system'
          var dark =
            pref === 'dark' ||
            (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          var el = document.documentElement
          if (dark) el.classList.add('dark')
          el.style.colorScheme = dark ? 'dark' : 'light'
          var vibrant = !!window.jaz && /Mac/.test(navigator.platform)
          if (vibrant) el.classList.add('vibrant')
          el.style.background = vibrant
            ? 'transparent'
            : dark
              ? 'oklch(0.208 0.007 262)'
              : 'oklch(0.963 0.007 262)'
        } catch (e) {}
        // Apply appearance prefs before first paint so zoom and custom fonts
        // don't reflow after mount. CSS owns fallback stacks and layout widths.
        try {
          var el2 = document.documentElement
          if (localStorage.getItem('jaz.appearance.effects') === 'false')
            el2.classList.add('jaz-no-effects')
          var scale = localStorage.getItem('jaz.appearance.fontScale')
          if (scale === '0.9' || scale === '1.1' || scale === '1.25') el2.style.zoom = scale
          function fontVar(name) {
            return '"' + String(name).replace(/["\\]/g, '').trim() + '"'
          }
          var uiFont = localStorage.getItem('jaz.appearance.uiFont')
          if (uiFont && uiFont.trim()) el2.style.setProperty('--jaz-ui-font', fontVar(uiFont))
          var monoFont = localStorage.getItem('jaz.appearance.monoFont')
          if (monoFont && monoFont.trim()) el2.style.setProperty('--jaz-mono-font', fontVar(monoFont))
          if (localStorage.getItem('jaz.appearance.wideLayout') === 'true')
            el2.classList.add('jaz-wide-layout')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
