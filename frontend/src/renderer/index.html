<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale + user-scalable=no stop iOS Safari from zooming the
         viewport when a small-font input gains focus; in-app scaling is the
         Appearance font-scale (documentElement.zoom), not browser pinch-zoom. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <!-- Installed-to-home-screen (iOS/Android): without a manifest declaring a
         standalone scope, iOS treats the web-clip as a bookmark and opens every
         in-app navigation in its in-app Safari browser. scope:"/" + standalone
         keep SPA routing inside the installed app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-1024.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Jaz" />
    <meta name="theme-color" content="#f1f2f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1b22" media="(prefers-color-scheme: dark)" />
    <title>Jaz</title>
    <!-- Appearance defaults: a separate, swappable config file (see
         public/appearance-defaults.js). Classic, blocking script so the global
         is set before the pre-paint script below runs. -->
    <script src="/appearance-defaults.js"></script>
    <script>
      // Apply the saved theme before first paint so dark launches never flash
      // white. Mirrors lib/theme.ts; keep the dark bg value in sync with the
      // --color-bg token under :root.dark. In the mac app (preload present)
      // the page stays transparent so the window's vibrancy material shows.
      ;(function () {
        // Build-time appearance defaults sit *under* the user's own keys: a
        // localStorage value wins, otherwise the config default, otherwise the
        // built-in default.
        var sd = window.__JAZ_APPEARANCE_DEFAULTS__ || {}
        try {
          var pref = localStorage.getItem('jaz.theme')
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system')
            pref =
              sd.theme === 'light' || sd.theme === 'dark' || sd.theme === 'system'
                ? sd.theme
                : 'system'
          var dark =
            pref === 'dark' ||
            (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          var el = document.documentElement
          if (dark) el.classList.add('dark')
          el.style.colorScheme = dark ? 'dark' : 'light'
          var vibrant = !!window.jaz && /Mac/.test(navigator.platform)
          if (vibrant) el.classList.add('vibrant')
          el.style.background = vibrant
            ? 'transparent'
            : dark
              ? 'oklch(0.208 0.007 262)'
              : 'oklch(0.963 0.007 262)'
        } catch (e) {}
        // Apply appearance prefs before first paint so zoom and custom fonts
        // don't reflow after mount. CSS owns fallback stacks and layout widths.
        try {
          var el2 = document.documentElement
          var effects = localStorage.getItem('jaz.appearance.effects')
          if (effects === 'false' || (effects === null && sd.effects === false))
            el2.classList.add('jaz-no-effects')
          var accent = localStorage.getItem('jaz.appearance.accent')
          if (accent === null && typeof sd.accent === 'number') accent = String(sd.accent)
          // Match normalizeAccent in lib/appearance.ts: only a finite hue in
          // [0, 360) overrides; anything else falls back to the CSS default.
          var accentHue = accent === null ? NaN : Number(accent)
          if (accentHue >= 0 && accentHue < 360) el2.style.setProperty('--accent-h', String(accentHue))
          var scale = localStorage.getItem('jaz.appearance.fontScale')
          if (scale === null && sd.fontScale != null) scale = String(sd.fontScale)
          if (scale === '0.9' || scale === '1.1' || scale === '1.25') el2.style.zoom = scale
          function fontVar(name) {
            return '"' + String(name).replace(/["\\]/g, '').trim() + '"'
          }
          var uiFont = localStorage.getItem('jaz.appearance.uiFont')
          if (uiFont === null && sd.uiFont) uiFont = sd.uiFont
          if (uiFont && String(uiFont).trim()) el2.style.setProperty('--jaz-ui-font', fontVar(uiFont))
          var monoFont = localStorage.getItem('jaz.appearance.monoFont')
          if (monoFont === null && sd.monoFont) monoFont = sd.monoFont
          if (monoFont && String(monoFont).trim())
            el2.style.setProperty('--jaz-mono-font', fontVar(monoFont))
          var wide = localStorage.getItem('jaz.appearance.wideLayout')
          if (wide === 'true' || (wide === null && sd.wideLayout === true))
            el2.classList.add('jaz-wide-layout')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
