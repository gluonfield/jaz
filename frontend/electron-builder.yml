appId: dev.wins.jaz
productName: Jaz
directories:
  output: dist
files:
  - out/**
extraResources:
  - from: resources/bin
    to: bin
mac:
  icon: src/assets/jaz.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Jaz uses the microphone for voice input.
win:
  icon: src/assets/jaz.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
dmg:
  background: build/dmg-background.png
  window:
    width: 540
    height: 380
  icon: src/assets/jaz.icns
  iconSize: 96
  iconTextSize: 12
  contents:
    - x: 136
      y: 242
      type: file
    - x: 404
      y: 242
      type: link
      path: /Applications
publish:
  provider: github
  owner: gluonfield
  repo: jaz
  releaseType: release
npmRebuild: false
