appId: dev.wins.jaz
productName: Jaz
directories:
  output: dist
files:
  - out/**
extraResources:
  - from: resources/bin
    to: bin
mac:
  icon: src/assets/jaz.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Jaz uses the microphone for voice input.
publish:
  provider: github
  owner: amgauge
  repo: jaz
  releaseType: release
npmRebuild: false
