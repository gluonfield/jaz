name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@v4
        with:
          repository: gluonfield/jazmem
          path: _deps/jazmem

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Point backend at jazmem checkout
        working-directory: backend
        run: go mod edit "-replace=github.com/gluonfield/jazmem=../_deps/jazmem"

      - name: Check tag version
        run: |
          tag_version="${{ github.event.release.tag_name }}"
          tag_version="${tag_version#v}"
          package_version="$(node -p "require('./frontend/package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag v$tag_version does not match frontend/package.json version $package_version"
            exit 1
          fi

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build Linux backend artifacts
        working-directory: backend
        run: |
          mkdir -p ../dist/backend
          for arch in amd64 arm64; do
            name="jaz-backend-linux-${arch}"
            out="../dist/backend/${name}"
            mkdir -p "$out"
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }}" -o "$out/jaz" ./cmd/jaz
            tar -C "$out" -czf "../dist/backend/${name}.tar.gz" jaz
            sha256sum "../dist/backend/${name}.tar.gz" > "../dist/backend/${name}.tar.gz.sha256"
          done

      - name: Attach backend release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/backend/*.tar.gz \
            dist/backend/*.sha256 \
            --clobber

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@v4
        with:
          repository: gluonfield/jazmem
          path: _deps/jazmem

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Point backend at jazmem checkout
        working-directory: backend
        run: go mod edit "-replace=github.com/gluonfield/jazmem=../_deps/jazmem"

      - name: Check tag version
        run: |
          tag_version="${{ github.event.release.tag_name }}"
          tag_version="${tag_version#v}"
          package_version="$(bun -e "console.log(require('./frontend/package.json').version)")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag v$tag_version does not match frontend/package.json version $package_version"
            exit 1
          fi

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/jaz-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Decode notarization key
        env:
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/apple/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Build macOS backend artifacts
        working-directory: backend
        run: |
          mkdir -p ../dist/backend
          for arch in amd64 arm64; do
            name="jaz-backend-darwin-${arch}"
            out="../dist/backend/${name}"
            mkdir -p "$out"
            GOOS=darwin GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }}" -o "$out/jaz" ./cmd/jaz
            tar -C "$out" -czf "../dist/backend/${name}.tar.gz" jaz
            shasum -a 256 "../dist/backend/${name}.tar.gz" > "../dist/backend/${name}.tar.gz.sha256"
          done

      - name: Build
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey_${{ vars.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
          VITE_POSTHOG_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com
        run: |
          bun run build:backend
          bun run build:bundle
          bunx electron-builder --mac --arm64 --publish never

      - name: Attach backend release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/backend/*.tar.gz \
            dist/backend/*.sha256 \
            --clobber

      - name: Attach release assets
        working-directory: frontend
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.dmg \
            dist/*.zip \
            dist/latest-mac.yml \
            --clobber

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@v4
        with:
          repository: gluonfield/jazmem
          path: _deps/jazmem

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Point backend at jazmem checkout
        working-directory: backend
        run: go mod edit "-replace=github.com/gluonfield/jazmem=../_deps/jazmem"

      - name: Check tag version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.event.release.tag_name }}".TrimStart("v")
          $packageVersion = bun -e "console.log(require('./frontend/package.json').version)"
          if ($tagVersion -ne $packageVersion) {
            throw "Tag v$tagVersion does not match frontend/package.json version $packageVersion"
          }

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Compile backend tests
        working-directory: backend
        run: go test -run '^$' ./...

      - name: Build
        working-directory: frontend
        env:
          VITE_POSTHOG_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com
        run: |
          bun run build:backend
          bun run build:bundle
          bunx electron-builder --win --x64 --publish never

      - name: Smoke packaged app
        working-directory: frontend
        shell: pwsh
        run: |
          $exe = (Resolve-Path "dist/win-unpacked/Jaz.exe").Path
          $log = Join-Path $env:APPDATA "Jaz\logs\main.log"
          Remove-Item $log -Force -ErrorAction SilentlyContinue
          $proc = Start-Process -FilePath $exe -PassThru
          try {
            $ready = $false
            $deadline = (Get-Date).AddSeconds(20)
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
              $proc.Refresh()
              if ($proc.HasExited) {
                if (Test-Path $log) {
                  Get-Content $log -Tail 80
                }
                throw "Jaz exited during smoke launch with code $($proc.ExitCode)"
              }
              $logText = ""
              if (Test-Path $log) {
                $logText = Get-Content $log -Raw
              }
              if ($logText -match "failed to load|preload failed|renderer exited|renderer console 3|uncaught exception") {
                Get-Content $log -Tail 80
                throw "Jaz logged a startup failure during smoke launch"
              }
              $loaded = $logText -match "main window loaded"
              $shown = $logText -match "main window shown"
              $hasWindow = $proc.MainWindowHandle -ne 0
              if ($loaded -and $shown -and $hasWindow) {
                $ready = $true
                break
              }
            }
            if (!$ready) {
              if (Test-Path $log) {
                Get-Content $log -Tail 80
              }
              throw "Jaz did not show a main window during smoke launch"
            }
          } finally {
            if (!$proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Attach release assets
        working-directory: frontend
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" `
            dist/*.exe `
            dist/*.zip `
            dist/latest.yml `
            --clobber
