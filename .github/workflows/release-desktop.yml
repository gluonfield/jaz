name: Release Desktop

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@v4
        with:
          repository: gluonfield/jazmem
          path: _deps/jazmem

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Point backend at jazmem checkout
        working-directory: backend
        run: go mod edit -replace=github.com/gluonfield/jazmem="$GITHUB_WORKSPACE/_deps/jazmem"

      - name: Build CLI archives
        working-directory: backend
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            name="$1"
            cmd="$2"
            bin="$3"
            goos="$4"
            goarch="$5"
            dir="${name}_${RELEASE_TAG}_${goos}_${goarch}"
            rm -rf "dist/$dir"
            mkdir -p "dist/$dir"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/$dir/$bin" "./cmd/$cmd"
            tar -C dist -czf "dist/$dir.tar.gz" "$dir"
            rm -rf "dist/$dir"
          }

          build_all() {
            name="$1"
            cmd="$2"
            bin="$3"
            build "$name" "$cmd" "$bin" linux amd64
            build "$name" "$cmd" "$bin" linux arm64
            build "$name" "$cmd" "$bin" darwin amd64
            build "$name" "$cmd" "$bin" darwin arm64
          }

          build_all jaz-server jaz jaz
          build_all jaz-chat jaz-chat jaz-chat
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Attach CLI assets
        working-directory: backend
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/jaz-*.tar.gz \
            dist/SHA256SUMS \
            --clobber

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/checkout@v4
        with:
          repository: gluonfield/jazmem
          path: _deps/jazmem

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Point backend at jazmem checkout
        working-directory: backend
        run: go mod edit -replace=github.com/gluonfield/jazmem="$GITHUB_WORKSPACE/_deps/jazmem"

      - name: Check tag version
        run: |
          tag_version="${{ github.event.release.tag_name }}"
          tag_version="${tag_version#v}"
          package_version="$(bun -e "console.log(require('./frontend/package.json').version)")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag v$tag_version does not match frontend/package.json version $package_version"
            exit 1
          fi

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/jaz-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Decode notarization key
        env:
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/apple/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Build
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey_${{ vars.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
        run: |
          bun run build:backend
          bun run build:bundle
          ./node_modules/.bin/electron-builder --mac --arm64 --publish never

      - name: Attach release assets
        working-directory: frontend
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.dmg \
            dist/*.zip \
            dist/*.blockmap \
            dist/latest-mac.yml \
            --clobber
