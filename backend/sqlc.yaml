version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/storage/sqlite/migrations"
    queries: "internal/storage/sqlite/queries/loops"
    gen:
      go:
        package: "loopdb"
        out: "internal/storage/sqlite/generated/loops"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
