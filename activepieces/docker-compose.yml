services:
  app:
    image: ghcr.io/activepieces/activepieces:${ACTIVEPIECES_VERSION:-0.83.0}
    container_name: jaz-activepieces-app
    restart: unless-stopped
    ports:
      - "${ACTIVEPIECES_PORT:-8080}:80"
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      AP_CONTAINER_TYPE: WORKER_AND_APP
    volumes:
      - ./data/cache:/usr/src/app/cache
      - ./io:/jaz-io
    networks:
      - activepieces

  postgres:
    image: pgvector/pgvector:0.8.0-pg14
    container_name: jaz-activepieces-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${AP_POSTGRES_DATABASE}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
      POSTGRES_USER: ${AP_POSTGRES_USERNAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - activepieces

  redis:
    image: redis:7.0.7
    container_name: jaz-activepieces-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - activepieces

networks:
  activepieces:
