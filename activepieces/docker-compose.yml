services:
  activepieces:
    image: activepieces/activepieces:latest
    restart: unless-stopped
    ports:
      - "8081:80" # jaz owns 8080
    depends_on:
      - postgres
      - redis
    environment:
      AP_ENVIRONMENT: prod
      AP_FRONTEND_URL: http://localhost:8081
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY}
      AP_JWT_SECRET: ${AP_JWT_SECRET}
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
      AP_REDIS_HOST: redis
      AP_REDIS_PORT: "6379"
      # lake-writer needs filesystem access from code/piece execution
      AP_EXECUTION_MODE: UNSANDBOXED
      AP_TELEMETRY_ENABLED: "false"
    volumes:
      - ${HOME}/data:/data
      - ${HOME}/.jaz/memory/inbox:/memory-inbox

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # One-shot: waits for AP, creates/signs in the admin from .env, and installs
  # pieces/lake-writer/dist/*.tgz if that name+version is not already present.
  piece-installer:
    image: alpine:3.20
    restart: "no"
    depends_on:
      - activepieces
    environment:
      AP_URL: http://activepieces:80
      AP_EMAIL: ${AP_EMAIL}
      AP_PASSWORD: ${AP_PASSWORD}
    volumes:
      - ./pieces/lake-writer/dist:/piece-dist:ro
      - ./pieces/lake-writer/package.json:/piece-package.json:ro
      - ./installer/install-piece.sh:/install-piece.sh:ro
    command: sh /install-piece.sh

volumes:
  postgres_data:
  redis_data:
