services:
  app:
    image: ghcr.io/activepieces/activepieces:${ACTIVEPIECES_VERSION}
    container_name: jaz-activepieces-app
    restart: unless-stopped
    ports:
      - "${ACTIVEPIECES_PORT}:80" # jaz defaults to 5299
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      AP_CONTAINER_TYPE: WORKER_AND_APP
    volumes:
      - ${JAZ_INGEST_ROOT:-${HOME}/.jaz/ingest}:/jaz-ingest
      - ./data/cache:/usr/src/app/cache
      - ${JAZ_MEMORY_ROOT:-${HOME}/.jaz/memory}/inbox:/memory-inbox

  postgres:
    image: pgvector/pgvector:0.8.0-pg14
    container_name: jaz-activepieces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AP_POSTGRES_DATABASE}
      POSTGRES_USER: ${AP_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.0.7
    container_name: jaz-activepieces-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  # One-shot: waits for AP, signs in with the admin account, and installs the
  # Jaz ingest writer archive if that name+version is not already present.
  # Exits immediately when there is nothing to do; re-runs on every `up`.
  piece-installer:
    image: alpine:3.20
    restart: "no"
    depends_on:
      - app
    environment:
      AP_URL: http://app:80
      AP_EMAIL: ${AP_ADMIN_EMAIL}
      AP_PASSWORD: ${AP_ADMIN_PASSWORD}
      PIECE_NAME: ${JAZ_LAKE_WRITER_PIECE_NAME:-@activepieces/piece-lake-writer}
      PIECE_VERSION: ${JAZ_LAKE_WRITER_PIECE_VERSION:-0.1.2}
      PIECE_ARCHIVE_URL: ${JAZ_LAKE_WRITER_ARCHIVE_URL:-}
    volumes:
      - ./piece-archives:/piece-dist:ro
      - ./installer/install-piece.sh:/install-piece.sh:ro
    command: sh /install-piece.sh
